name: Setup WolfSSH-DOS Project

on:
  workflow_dispatch:

env:
  # This silences the Node.js warning and opts into the newer engine
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-fdwolfssh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Pull wolfSSL
        # Using --branch v5.7.2 as a safe fallback if 5.8.0 tag isn't found
        # Or change to 'master' for the absolute latest
        run: |
          git clone --depth 1 https://github.com wolfssl
          cd wolfssl && git fetch --tags
          git checkout v5.7.2 || git checkout master

      - name: Pull wolfSSH
        run: |
          git clone --depth 1 https://github.com wolfssh
          cd wolfssh && git fetch --tags
          git checkout v1.4.14 || git checkout master

      - name: Create DOS-Ready Structure
        run: |
          # Create include paths
          mkdir -p include/wolfssl
          mkdir -p include/wolfssh
          
          # Copy headers
          cp -r wolfssl/wolfssl/* ./include/wolfssl/
          cp -r wolfssh/wolfssh/* ./include/wolfssh/
          
          # Setup Source
          mkdir -p src
          cp wolfssl/wolfcrypt/src/*.c ./src/
          cp wolfssl/src/*.c ./src/
          cp wolfssh/src/*.c ./src/
          
          # Clean up unneeded source to keep ZIP small
          rm -rf wolfssl wolfssh

      - name: Create fdwolfssh user_settings.h
        run: |
          cat <<EOF > user_settings.h
          /* fdwolfssh Configuration for FreeDOS */
          #ifndef WOLFSSL_USER_SETTINGS
          #define WOLFSSL_USER_SETTINGS
          #endif

          #define WOLFSSL_WATT32            /* WATT-32 TCP/IP Support */
          #define WOLFSSH_SERVER            /* Build as SSH Server */
          #define LITTLE_ENDIAN_ORDER       /* x86 is Little Endian */
          
          #define SIZEOF_LONG 4
          #define SIZEOF_LONG_LONG 8
          
          #define NO_WOLFSSL_DIR            /* Standard DOS lacks POSIX dirs */
          #define WOLFSSL_NO_FLOAT_FMT      /* Save memory, no floats */
          #define WOLFSSL_STATIC_MEMORY     /* Optimize for DOS RAM limits */
          
          /* Modern Security primitives */
          #define HAVE_ECC
          #define HAVE_AESGCM
          #define HAVE_CURVE25519
          #define HAVE_ED25519
          EOF

      - name: Create build.bat
        run: |
          cat <<EOF > build.bat
          @echo off
          echo Starting fdwolfssh Build...
          REM Watcom 32-bit compiler calls
          REM -i=.\include for headers
          REM -mf for flat memory model (32-bit)
          wcc386 src\*.c -i=.\include -fpi87 -d2 -mf
          echo Build complete. Use wlink to bind DOS32A.
          EOF

      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: fdwolfssh-source-bundle
          path: |
            include/
            src/
            user_settings.h
            build.bat
