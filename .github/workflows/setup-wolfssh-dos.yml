name: Setup fdwolfssh Project

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-fdwolfssh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fdwolfssh (This Repo)
        uses: actions/checkout@v4

      - name: Pull wolfSSL
        uses: actions/checkout@v4
        with:
          repository: wolfSSL/wolfssl
          path: wolfssl
          ref: v5.9.1 # Use latest stable for Watcom support

      - name: Pull wolfSSH
        uses: actions/checkout@v4
        with:
          repository: wolfSSL/wolfssh
          path: wolfssh
          ref: v1.5.0 # Latest stable

      - name: Create DOS-Ready Structure
        run: |
          mkdir -p include/wolfssl include/wolfssh src
          
          # Move Headers
          cp -r wolfssl/wolfssl/* ./include/wolfssl/
          cp -r wolfssh/wolfssh/* ./include/wolfssh/
          
          # Move Source Files
          cp wolfssl/wolfcrypt/src/*.c ./src/
          cp wolfssl/src/*.c ./src/
          cp wolfssh/src/*.c ./src/
          
          # Clean original folders to save space
          rm -rf wolfssl wolfssh

      - name: Generate Build Files
        run: |
          cat <<EOF > user_settings.h
          #ifndef WOLFSSL_USER_SETTINGS
          #define WOLFSSL_USER_SETTINGS
          #endif
          #define WOLFSSL_WATT32
          #define WOLFSSH_SERVER
          #define LITTLE_ENDIAN_ORDER
          #define SIZEOF_LONG 4
          #define SIZEOF_LONG_LONG 8
          #define NO_WOLFSSL_DIR
          #define WOLFSSL_NO_FLOAT_FMT
          #define WOLFSSL_STATIC_MEMORY
          #define HAVE_ECC
          #define HAVE_AESGCM
          #define HAVE_CURVE25519
          #define HAVE_ED25519
          EOF

          cat <<EOF > fdssh.lnk
          system dos32a
          name fdssh.exe
          file src/*.obj
          library wattcp.lib
          option stack=64k
          option quiet
          EOF

          cat <<EOF > build.bat
          @echo off
          echo Building fdwolfssh for FreeDOS...
          wcc386 src\*.c -i=.\include -fpi87 -d2 -mf -dDWOLFSSL_USER_SETTINGS
          wlink @fdssh.lnk
          sb /b fdssh.exe
          echo Done.
          EOF

      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: fdwolfssh-source-bundle
          path: |
            include/
            src/
            user_settings.h
            fdssh.lnk
            build.bat
