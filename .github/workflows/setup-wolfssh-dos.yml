name: Setup WolfSSH-DOS Project
on:
  workflow_dispatch: # Run manually from the Actions tab
  push:
    branches: [main, master]
permissions:
  contents: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-fdwolfssh:
    runs-on: windows-latest # Required for FreeDOS/DOS compilers
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
      
      - name: Pull wolfSSL and wolfSSH
        run: |
          set -e
          git clone --depth 1 https://github.com/wolfSSL/wolfssl.git wolfssl
          git clone --depth 1 https://github.com/wolfSSL/wolfssh.git wolfssh
      
      - name: Create DOS-Ready Structure
        run: |
          # Create clean include and source directories
          mkdir -p include/wolfssl include/wolfssh src

          # Copy headers to unified include path
          Copy-Item -Path "wolfssl\wolfssl\*.h" -Destination "./include/wolfssl/" -Recurse -Force
          Copy-Item -Path "wolfssh\wolfssh\*.h" -Destination "./include/wolfssh/" -Recurse -Force

          # Move all necessary C files to a single source folder for simpler compilation
          Copy-Item -Path "wolfssl\wolfcrypt\src\*.c" -Destination "./src/" -Recurse -Force
          Copy-Item -Path "wolfssl\src\*.c" -Destination "./src/" -Recurse -Force
          Copy-Item -Path "wolfssh\src\*.c" -Destination "./src/" -Recurse -Force

          # Clean up original clones to keep the artifact light
          Remove-Item -Recurse -Force "wolfssl", "wolfssh"
      
      - name: Create Configuration & Build Files
        run: |
          # 1. Generate user_settings.h (The brain of the build)
          $userSettings = @"
          #ifndef WOLFSSL_USER_SETTINGS
          #define WOLFSSL_USER_SETTINGS
          #endif
          #define WOLFSSL_WATT32            /* Link with WATT-32 stack */
          #define WOLFSSH_SERVER            /* Build as SSH Server */
          #define LITTLE_ENDIAN_ORDER       /* x86 is Little Endian */
          #define SIZEOF_LONG 4
          #define SIZEOF_LONG_LONG 8
          #define NO_WOLFSSL_DIR
          #define WOLFSSL_NO_FLOAT_FMT
          #define WOLFSSL_STATIC_MEMORY
          #define HAVE_ECC
          #define HAVE_AESGCM
          #define HAVE_CURVE25519
          #define HAVE_ED25519
          "@
          $userSettings | Out-File -FilePath "user_settings.h"

          # 2. Generate fdssh.lnk (Linker script for wlink)
          $linkerScript = @"
          system dos32a
          name fdssh.exe
          file src\*.obj
          library wattcp.lib
          option stack=64k
          option quiet
          "@
          $linkerScript | Out-File -FilePath "fdssh.lnk"

          # 3. Generate build.bat (The DOS build script)
          $buildBat = @"
          @echo off
          echo Building fdwolfssh for FreeDOS...
          wcc386 src\*.c -i=.\include -fpi87 -d2 -mf -dDWOLFSSL_USER_SETTINGS
          echo Linking...
          wlink @fdssh.lnk
          echo Finalizing with DOS32A...
          sb /b fdssh.exe
          echo Done: FDSSH.EXE created.
          "@
          $buildBat | Out-File -FilePath "build.bat"
          Set-Content -Path "build.bat" -Value $buildBat
      - name: Build fdwolfssh
        run: |
          .\build.bat
        shell: cmd
      - name: Upload fdwolfssh Bundle
        uses: actions/upload-artifact@v4
        with:
          name: fdwolfssh-source-bundle
          path: |
            include/
            src/
            user_settings.h
            fdssh.lnk
            build.bat
            fdssh.exe
          if-no-files-found: ignore
          retention-days: 7
